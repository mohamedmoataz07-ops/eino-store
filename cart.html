<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eino Store - Cart</title>


<style>

body{

font-family:Arial;

background:#f8f8f8;

margin:0;

}


header{

background:#111;

color:white;

padding:20px;

text-align:center;

}


.logo{

font-size:32px;

font-weight:bold;

letter-spacing:3px;

}


.cart{

background:white;

max-width:700px;

margin:40px auto;

padding:30px;

border-radius:10px;

}


.item{

display:flex;

align-items:center;

justify-content:space-between;

gap:20px;

padding:20px 0;

border-bottom:1px solid #ddd;

}


.product-left{

display:flex;

align-items:center;

gap:20px;

}


.product-image{

width:120px;

height:120px;

object-fit:cover;

border-radius:10px;

}


.info{

line-height:1.8;

}


.actions{

margin-top:10px;

}


.actions button{

background:#111;

color:white;

border:0;

padding:8px 15px;

cursor:pointer;

margin:3px;

}


.remove{

background:#900 !important;

}


.price{

font-weight:bold;

font-size:18px;

white-space:nowrap;

}


.total{

font-size:25px;

font-weight:bold;

margin-top:20px;

}


.checkout-btn{

background:#111;

color:white;

padding:15px;

width:100%;

border:0;

cursor:pointer;

margin-top:20px;

}


@media(max-width:600px){

.cart{

margin:20px;

padding:20px;

}


.item{

align-items:flex-start;

}


.product-left{

flex-direction:column;

align-items:flex-start;

}


.product-image{

width:100px;

height:100px;

}


.price{

font-size:16px;

}

}

</style>

</head>


<body>


<header>

<div class="logo">

EINO STORE

</div>

</header>



<div class="cart">


<h1>Your Cart</h1>


<div id="cartItems"></div>


<div class="total" id="total">

Total: 0 EGP

</div>


<a href="checkout.html">

<button class="checkout-btn">

Checkout

</button>

</a>


</div>



<script>


let cart = JSON.parse(localStorage.getItem("cart")) || [];


let items = document.getElementById("cartItems");


let total = 0;



function displayCart(){


items.innerHTML = "";


total = 0;



if(cart.length === 0){

items.innerHTML = "<p>Your cart is empty.</p>";

document.getElementById("total").innerHTML = "Total: 0 EGP";

return;

}



cart.forEach((product, index) => {


let price = parseInt(product.price) || 0;


let quantity = product.quantity || 1;


total += price * quantity;



items.innerHTML += `


<div class="item">


<div class="product-left">


<img

class="product-image"

src="${product.image || 'https://via.placeholder.com/120'}"

alt="${product.name}"


>


<div class="info">


<b>${product.name}</b>


<br>


Size: ${product.size || "Not selected"}


<br>


Color: ${product.color || "Not selected"}



<div class="actions">


<button onclick="decreaseQuantity(${index})">

-

</button>


<span>

${quantity}

</span>


<button onclick="increaseQuantity(${index})">

+

</button>


<br>


<button class="remove" onclick="removeItem(${index})">

Remove

</button>


</div>


</div>


</div>



<div class="price">

${price * quantity} EGP

</div>


</div>


`;

});


document.getElementById("total").innerHTML =

"Total: " + total + " EGP";


}



function increaseQuantity(index){


if(!cart[index].quantity){

cart[index].quantity = 1;

}


cart[index].quantity++;


saveCart();


}



function decreaseQuantity(index){


if(!cart[index].quantity){

cart[index].quantity = 1;

}


if(cart[index].quantity > 1){

cart[index].quantity--;

}


saveCart();


}



function removeItem(index){


cart.splice(index,1);


saveCart();


}



function saveCart(){


localStorage.setItem(

"cart",

JSON.stringify(cart)

);


displayCart();


}



displayCart();


</script>


</body>

</html>
