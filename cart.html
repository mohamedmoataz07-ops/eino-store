<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eino Store - Cart</title>

<style>

body{
font-family:Arial;
background:#f8f8f8;
margin:0;
}


header{
background:#111;
color:white;
padding:20px;
text-align:center;
}


.logo{
font-size:32px;
font-weight:bold;
}


.cart{

background:white;
margin:40px auto;
padding:30px;
max-width:600px;
border-radius:10px;

}


.item{

display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid #ddd;

}


.total{

font-size:25px;
font-weight:bold;
margin-top:20px;

}


button{

background:#111;
color:white;
padding:15px 30px;
border:0;
cursor:pointer;

}


</style>

</head>


<body>


<header>

<div class="logo">
EINO STORE
</div>

</header>



<div class="cart">


<h1>Your Cart</h1>


<div id="cartItems"></div>

<div class="total" id="total">
Total: 0 EGP
</div>


<div class="total">

Total: 399 EGP

</div>


<br>


<a href="https://wa.me/201024847508">

<button onclick="orderWhatsApp()">
Checkout
</button>



</div>


<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let items = document.getElementById("cartItems");

let total = 0;


cart.forEach(product => {

items.innerHTML += `

<div class="item">

<span>${product.name}</span>

<span>${product.price} EGP</span>

</div>

`;

total += product.price;

});


document.getElementById("total").innerHTML =
"Total: " + total + " EGP";



function orderWhatsApp(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let message = "Hello Eino Store 👕%0A%0AMy Order:%0A";

let total = 0;


cart.forEach(product => {

message += "- " + product.name + " : " + product.price + " EGP%0A";

total += product.price;

});


message += "%0ATotal: " + total + " EGP";


let phone = "201024847508";


window.open(
"https://wa.me/" + phone + "?text=" + message
);


}


</script></body>

</html>
