<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eino Store - Product</title>


<style>

body{
font-family:Arial;
margin:0;
background:#f8f8f8;
}


header{

background:#111;
color:white;
padding:20px;
text-align:center;

}


.logo{

font-size:32px;
font-weight:bold;
letter-spacing:3px;

}


.container{

display:flex;
justify-content:center;
gap:40px;
padding:50px;
flex-wrap:wrap;

}



.product-image img{

width:350px;
border-radius:10px;

}



.details{

max-width:400px;

}



.price{

font-size:28px;
font-weight:bold;

}



select{

padding:10px;
margin:10px;
width:150px;

}


button{

background:#111;
color:white;
padding:15px 40px;
border:0;
cursor:pointer;

}



footer{

background:#111;
color:white;
padding:20px;
text-align:center;

}


</style>


</head>


<script>

function addToCart(){

let product = {

name: "Classic T-Shirt",

price: "399 EGP",

size: document.querySelectorAll("select")[0].value,

color: document.querySelectorAll("select")[1].value

};


let cart = JSON.parse(localStorage.getItem("cart")) || [];


cart.push(product);


localStorage.setItem(
"cart",
JSON.stringify(cart)
);


alert("Product added to cart");


window.location.href="cart.html";

}

</script><body>


<header>

<div class="logo">
EINO STORE
</div>

</header>



<div class="container">


<div class="product-image">

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">

</div>



<div class="details">


<h1>Classic T-Shirt</h1>


<p>
Premium cotton T-shirt designed for everyday style.
</p>


<p class="price">
399 EGP
</p>



<h3>Choose Size</h3>

<select id="size">

<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>

</select>



<h3>Choose Color</h3>

<select id="color">

<option>Black</option>
<option>White</option>
<option>Gray</option>

</select>


<br><br>


<button onclick="addToCart()">
Add To Cart
</button>
</a>



</div>


</div>



<footer>

© 2026 Eino Store

</footer>


</body>

</html>
